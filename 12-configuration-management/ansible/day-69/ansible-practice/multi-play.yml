---
- name: Configure web servers
  hosts: web
  become: true

  tasks:
    - name: Install Nginx
      yum:
        name: nginx
        state: present

    - name: Start Nginx
      service:
        name: nginx
        state: started
        enabled: true

- name: Configure app servers
  hosts: app
  become: true

  tasks:
    - name: Install development packages
      yum:
        name:
          - gcc
          - make
        state: present

    - name: Create application directory
      file:
        path: /opt/app
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'

- name: Configure database servers
  hosts: db
  become: true

  tasks:
    - name: Install MariaDB client utilities
      yum:
        name: mariadb1011-client-utils
        state: present

    - name: Create data directory
      file:
        path: /var/lib/appdata
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0700'

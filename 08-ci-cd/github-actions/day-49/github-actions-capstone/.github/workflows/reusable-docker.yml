name: Reusable Docker Build and Push

on:
  workflow_call:
    inputs:
      docker_username:
        description: "Docker Hub username"
        required: true
        type: string

      image_name:
        description: "Docker image name"
        required: true
        type: string

      tag:
        description: "Docker image tag"
        required: true
        type: string

    secrets:
      docker_token:
        required: true

    outputs:
      image_url:
        description: "Full Docker image URL"
        value: ${{ jobs.docker.outputs.image_url }}

jobs:
  docker:
    runs-on: ubuntu-latest

    outputs:
      image_url: ${{ steps.image.outputs.image_url }}

    env:
      IMAGE_URL: ${{ inputs.docker_username }}/${{ inputs.image_name }}:${{ inputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Docker inputs
        run: |
          if [ -z "${{ inputs.docker_username }}" ]; then
            echo "docker_username input is missing"
            exit 1
          fi

          if [ -z "${{ inputs.image_name }}" ]; then
            echo "image_name input is missing"
            exit 1
          fi

          if [ -z "${{ inputs.tag }}" ]; then
            echo "tag input is missing"
            exit 1
          fi

          if [ -z "${{ secrets.docker_token }}" ]; then
            echo "docker_token secret is missing"
            exit 1
          fi

          echo "Docker inputs are available"
          echo "Image URL: $IMAGE_URL"

      - name: Set Docker image output
        id: image
        run: |
          echo "image_url=$IMAGE_URL" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ inputs.docker_username }}
          password: ${{ secrets.docker_token }}

      - name: Build Docker Image
        run: |
          docker build -t "$IMAGE_URL" .

      - name: Scan Docker Image for Vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_URL }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Push Docker Image
        run: |
          docker push "$IMAGE_URL"

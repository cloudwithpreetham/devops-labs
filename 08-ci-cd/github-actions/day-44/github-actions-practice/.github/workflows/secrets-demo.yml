name: Secrets Demo

on:
  push:
    paths:
      - ".github/workflows/secrets-demo.yml"
  workflow_dispatch:

jobs:
  secrets-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check if secret exists
        run: |
          if [ -n "${{ secrets.MY_SECRET_MESSAGE }}" ]; then
            echo "The secret is set: true"
          else
            echo "The secret is set: false"
          fi

      - name: Try printing secret directly
        run: |
          echo "Secret value is: ${{ secrets.MY_SECRET_MESSAGE }}"

      - name: Use secret as environment variable
        env:
          SECRET_MESSAGE: ${{ secrets.MY_SECRET_MESSAGE }}
        run: |
          if [ -n "$SECRET_MESSAGE" ]; then
            echo "Secret was successfully passed as an environment variable"
          else
            echo "Secret was not found"
            exit 1
          fi

      - name: Verify Docker secrets exist
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        run: |
          if [ -n "$DOCKER_USERNAME" ] && [ -n "$DOCKER_TOKEN" ]; then
            echo "Docker secrets are configured"
          else
            echo "Docker secrets are missing"
            exit 1
          fi

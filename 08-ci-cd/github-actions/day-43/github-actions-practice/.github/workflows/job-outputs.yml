name: Job Outputs Demo

on:
  push:
    branches:
      - "**"

jobs:
  generate-date:
    runs-on: ubuntu-latest

    outputs:
      today: ${{ steps.date-step.outputs.today }}

    steps:
      - name: Set today's date
        id: date-step
        run: echo "today=$(date)" >> $GITHUB_OUTPUT

  use-date:
    runs-on: ubuntu-latest
    needs: generate-date

    steps:
      - name: Print date from previous job
        run: |
          echo "Date received from previous job: ${{ needs.generate-date.outputs.today }}"

apiVersion: v1
kind: Pod
metadata:
  name: pvc-demo
spec:
  containers:
    - name: busybox
      image: busybox
      command:
        - sh
        - -c
        - sleep 3600
      volumeMounts:
        - mountPath: /data
          name: persistent-storage

  volumes:
    - name: persistent-storage
      persistentVolumeClaim:
        claimName: demo-pvc

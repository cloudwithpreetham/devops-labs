apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "bankapp.fullname" . }}-preinstall
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: preinstall
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Running pre-install checks..."
              sleep 5
              echo "Checks completed successfully."

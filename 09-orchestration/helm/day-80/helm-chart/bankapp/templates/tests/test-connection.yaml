apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "bankapp.fullname" . }}-test"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bankapp.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.8.0
      command:
        - sh
        - -c
        - |
          echo "Testing BankApp..."
          curl -f http://{{ include "bankapp.fullname" . }}-service:8080/actuator/health
